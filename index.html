<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Grossisti – Accesso</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm mx-4">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-600 rounded-xl mx-auto mb-4 flex items-center justify-center">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">Dashboard Grossisti</h1>
      <p class="text-slate-500 text-sm mt-1">Inserisci la password per accedere</p>
    </div>

    <div id="error" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3 mb-4">
      Password errata. Riprova.
    </div>

    <form id="loginForm">
      <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
      <input type="password" id="password"
        class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent mb-4"
        placeholder="••••••••" autofocus>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-2.5 rounded-lg transition-colors">
        Accedi
      </button>
    </form>
  </div>

  <script>
    const HASH = '66c403afea4fb1a835f9df1f0af6f0a83b30005de46217327a155767dbbfa1be';

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const pwd  = document.getElementById('password').value;
      const hash = await sha256(pwd);
      if (hash === HASH) {
        sessionStorage.setItem('auth', '1');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });

    if (sessionStorage.getItem('auth') === '1') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
