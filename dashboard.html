<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Grossisti</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <style>
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shrink-0">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-base font-bold text-slate-800 leading-tight" data-i18n="title">Dashboard Grossisti</h1>
          <p class="text-xs text-slate-400" id="lastUpdate">Caricamento...</p>
        </div>
      </div>
      <button onclick="logout()" data-i18n="logout"
        class="text-xs text-slate-400 hover:text-slate-600 px-3 py-1.5 rounded-lg hover:bg-slate-100 transition-colors">
        Esci
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">

    <!-- Loading -->
    <div id="loading" class="flex flex-col items-center justify-center py-24 gap-3">
      <div class="animate-spin w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full"></div>
      <p class="text-sm text-slate-400" data-i18n="loading">Caricamento dati...</p>
    </div>

    <!-- Content -->
    <div id="content" class="hidden fade-in space-y-6">

      <!-- Filtri (controllano tutta la dashboard) -->
      <div class="bg-white rounded-xl border border-slate-200 px-6 py-4 flex flex-col sm:flex-row sm:items-center gap-3">
        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider shrink-0" data-i18n="filters">Filtri</span>
        <div class="flex flex-wrap items-center gap-2">
          <select id="filterCountry"
            class="border border-slate-200 rounded-lg px-3 py-1.5 text-sm bg-white
                   focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="" data-i18n="allCountries">Tutte le nazioni</option>
          </select>
          <select id="filterRegion"
            class="border border-slate-200 rounded-lg px-3 py-1.5 text-sm bg-white
                   focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="" data-i18n="allRegions">Tutte le regioni</option>
          </select>
          <select id="filterClient"
            class="border border-slate-200 rounded-lg px-3 py-1.5 text-sm bg-white
                   focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="" data-i18n="allClients">Tutti i clienti</option>
          </select>
          <select id="filterGroup"
            class="border border-slate-200 rounded-lg px-3 py-1.5 text-sm bg-white
                   focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="" data-i18n="allClientGroups">Tutti i gruppi</option>
          </select>
          <span class="text-xs text-slate-400 ml-1" data-i18n="from">Da</span>
          <input type="date" id="filterFrom"
            class="border border-slate-200 rounded-lg px-2 py-1.5 text-sm bg-white
                   focus:outline-none focus:ring-2 focus:ring-blue-500">
          <span class="text-xs text-slate-400" data-i18n="to">A</span>
          <input type="date" id="filterTo"
            class="border border-slate-200 rounded-lg px-2 py-1.5 text-sm bg-white
                   focus:outline-none focus:ring-2 focus:ring-blue-500">
          <button id="filterReset" data-i18n="reset"

            Azzera
          </button>
          <span class="text-xs text-slate-400" id="filterScope"></span>
        </div>
      </div>

      <!-- Chart -->
      <div class="bg-white rounded-xl border border-slate-200 p-6">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
          <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider" data-i18n="revenueChart">
            Fatturato – da gennaio 2025
          </h2>
          <div class="flex gap-2 flex-wrap">
            <select id="chartGroup"
              class="border border-slate-200 rounded-lg px-3 py-1.5 text-sm bg-white
                     focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="" data-i18n="allGroups">Tutti i gruppi</option>
            </select>
            <select id="chartMode"
              class="border border-slate-200 rounded-lg px-3 py-1.5 text-sm bg-white
                     focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="A" data-i18n="monthly">Mensile</option>
              <option value="B" data-i18n="monthlyYoY">Mensile – confronto anni</option>
              <option value="C" data-i18n="quarterly">Trimestrale</option>
              <option value="D" data-i18n="quarterlyYoY">Trimestrale – confronto anni</option>
            </select>
          </div>
        </div>
        <canvas id="monthlyChart" height="70"></canvas>
      </div>

      <!-- Top products chart -->
      <div class="bg-white rounded-xl border border-slate-200 p-6">
        <h2 id="productChartTitle" class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4" data-i18n="top4Products">
          Top 4 prodotti per fatturato (dal 2026)
        </h2>
        <canvas id="productChart" height="70"></canvas>
      </div>

      <!-- Revenue by product group -->
      <div class="bg-white rounded-xl border border-slate-200 p-6">
        <h2 id="groupChartTitle" class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4" data-i18n="revenueByGroup">
          Fatturato per gruppo prodotto (dal 2026)
        </h2>
        <canvas id="groupChart" height="70"></canvas>
      </div>

      <!-- KPI Cards -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="kpiCards"></div>

      <!-- Confronto mensile YoY -->
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100">
          <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">
            <span data-i18n="monthlyComparison">Confronto mensile</span> <span id="yoyYears" class="text-slate-400 normal-case"></span>
          </h2>
        </div>
        <div id="monthlyTable"></div>
      </div>

      <!-- Clients -->
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
          <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider" data-i18n="ordersByClient">Ordini per Cliente</h2>
          <span class="text-xs text-slate-400" id="clientCount"></span>
        </div>
        <div id="clientsTable"></div>
      </div>

      <!-- Products -->
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
          <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider" data-i18n="productsOrdered">Prodotti Ordinati</h2>
          <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
            <select id="productSort"
              class="border border-slate-200 rounded-lg px-3 py-1.5 text-sm bg-white
                     focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="total" data-i18n="sortByRevenue">Per fatturato</option>
              <option value="qty" data-i18n="sortByQty">Per quantità</option>
            </select>
            <input type="text" id="productSearch" placeholder="Cerca codice o nome..." data-i18n-ph="searchProduct"
              class="border border-slate-200 rounded-lg px-3 py-1.5 text-sm w-full sm:w-56
                     focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>
        <div id="productsTable"></div>
      </div>

    </div><!-- /content -->
  </main>

  <script>
    const MODES = {
      A: { file: 'full.enc',      label: '',           lang: 'it' },
      B: { file: 'triveneto.enc', label: 'Triveneto',  lang: 'it' },
      C: { file: 'lazio.enc',     label: 'Lazio',         lang: 'it' },
      D: { file: 'portugal.enc',  label: 'Portugal',      lang: 'en' },
      E: { file: 'puglia.enc',    label: 'Puglia+Matera', lang: 'it' },
    };
    const DASH_MODE = sessionStorage.getItem('dashMode');
    const DASH_PWD  = sessionStorage.getItem('dashPwd');
    if (!DASH_MODE || !DASH_PWD || !MODES[DASH_MODE]) window.location.href = 'index.html';
    const DASH_INFO       = MODES[DASH_MODE] || MODES.A;
    const DATA_FILE       = DASH_INFO.file;
    const DASH_RESTRICTED = DASH_INFO.label !== '';
    const LANG = DASH_INFO.lang || 'it';

    const T_BUNDLES = {
      it: {
        loading: 'Caricamento dati...', errLoad: 'Errore nel caricamento dei dati. Riprova tra qualche minuto.',
        logout: 'Esci', filters: 'Filtri',
        allCountries: 'Tutte le nazioni', allRegions: 'Tutte le regioni', allClients: 'Tutti i clienti',
        allGroups: 'Tutti i gruppi', allClientGroups: 'Tutti i gruppi',
        from: 'Da', to: 'A', reset: 'Azzera',
        title: 'Dashboard Grossisti',
        revenueChart: 'Fatturato – da gennaio 2025',
        monthly: 'Mensile', monthlyYoY: 'Mensile – confronto anni',
        quarterly: 'Trimestrale', quarterlyYoY: 'Trimestrale – confronto anni',
        top4Products: 'Top 4 prodotti per fatturato (dal 2026)',
        top4ProductsRange: 'Top 4 prodotti per fatturato',
        revenueByGroup: 'Fatturato per gruppo prodotto (dal 2026)',
        revenueByGroupRange: 'Fatturato per gruppo prodotto',
        monthlyComparison: 'Confronto mensile',
        ordersByClient: 'Ordini per Cliente', productsOrdered: 'Prodotti Ordinati',
        searchProduct: 'Cerca codice o nome...',
        sortByRevenue: 'Per fatturato', sortByQty: 'Per quantità',
        updated: 'Aggiornato', view: 'Vista', scope: 'Ambito', allClientsLc: 'tutti i clienti',
        currentMonth: 'Mese Corrente', currentQuarter: 'Trimestre Corrente',
        previousQuarter: 'Trimestre Precedente', twoQuartersAgo: 'Due Trimestri Fa',
        vsPrev: 'vs trim. prec.',
        month: 'Mese', code: 'Codice', product: 'Prodotto', totalQty: 'Qtà Totale', valueEuro: 'Valore €',
        codeOrProduct: 'Codice / Prodotto', qty: 'Qtà', unitPrice: 'P. Unitario', total: 'Totale',
        order: 'Ordine', orders: 'ordini', clients: 'clienti', pieces: 'pz',
        noItems: 'Nessun articolo.', noOrders: 'Nessun ordine trovato.',
        noClientsFilter: 'Nessun cliente per i filtri selezionati.',
        noProducts: 'Nessun prodotto trovato.', noData: 'Nessun dato disponibile.',
        ship: 'spediz.', prod: 'prod.',
        revenue: 'Fatturato', quantity: 'Quantità',
        months:      ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'],
        monthsShort: ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'],
      },
      en: {
        loading: 'Loading data...', errLoad: 'Failed to load data. Please try again in a few minutes.',
        logout: 'Log out', filters: 'Filters',
        allCountries: 'All countries', allRegions: 'All regions', allClients: 'All clients',
        allGroups: 'All groups', allClientGroups: 'All groups',
        from: 'From', to: 'To', reset: 'Reset',
        title: 'Wholesalers Dashboard',
        revenueChart: 'Revenue – from January 2025',
        monthly: 'Monthly', monthlyYoY: 'Monthly – year comparison',
        quarterly: 'Quarterly', quarterlyYoY: 'Quarterly – year comparison',
        top4Products: 'Top 4 products by revenue (from 2026)',
        top4ProductsRange: 'Top 4 products by revenue',
        revenueByGroup: 'Revenue by product group (from 2026)',
        revenueByGroupRange: 'Revenue by product group',
        monthlyComparison: 'Monthly comparison',
        ordersByClient: 'Orders by Client', productsOrdered: 'Products ordered',
        searchProduct: 'Search by code or name...',
        sortByRevenue: 'By revenue', sortByQty: 'By quantity',
        updated: 'Updated', view: 'View', scope: 'Scope', allClientsLc: 'all clients',
        currentMonth: 'Current Month', currentQuarter: 'Current Quarter',
        previousQuarter: 'Previous Quarter', twoQuartersAgo: 'Two Quarters Ago',
        vsPrev: 'vs prev. qtr',
        month: 'Month', code: 'Code', product: 'Product', totalQty: 'Total Qty', valueEuro: 'Value €',
        codeOrProduct: 'Code / Product', qty: 'Qty', unitPrice: 'Unit Price', total: 'Total',
        order: 'Order', orders: 'orders', clients: 'clients', pieces: 'pcs',
        noItems: 'No items.', noOrders: 'No orders found.',
        noClientsFilter: 'No clients match the selected filters.',
        noProducts: 'No products found.', noData: 'No data available.',
        ship: 'ship.', prod: 'items',
        revenue: 'Revenue', quantity: 'Quantity',
        months:      ['January','February','March','April','May','June','July','August','September','October','November','December'],
        monthsShort: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
      }
    };
    const L = T_BUNDLES[LANG];

    function translateStaticUI() {
      document.title = L.title + ' – ' + (DASH_INFO.label || (LANG === 'en' ? 'All data' : 'Tutti i dati'));
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        if (L[k] != null) el.textContent = L[k];
      });
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const k = el.getAttribute('data-i18n-ph');
        if (L[k] != null) el.placeholder = L[k];
      });
    }
    translateStaticUI();

    function logout() {
      sessionStorage.removeItem('dashMode');
      sessionStorage.removeItem('dashPwd');
      window.location.href = 'index.html';
    }

    async function decryptEnc(enc, password) {
      const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
      const salt = b64(enc.salt), iv = b64(enc.iv), ct = b64(enc.ct);
      const baseKey = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
      const key = await crypto.subtle.deriveKey(
        { name:'PBKDF2', salt, iterations: enc.iter, hash:'SHA-256' },
        baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']);
      const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
      return JSON.parse(new TextDecoder().decode(pt));
    }

    const fmt = n =>
      '€ ' + fmtDec(n);
    const fmtN = n =>
      fmtNum(n);

    const KPI_COLORS = [
      {bg:'bg-blue-50',   text:'text-blue-600',   badge:'bg-blue-100'},
      {bg:'bg-emerald-50',text:'text-emerald-600', badge:'bg-emerald-100'},
      {bg:'bg-violet-50', text:'text-violet-600',  badge:'bg-violet-100'},
      {bg:'bg-amber-50',  text:'text-amber-600',   badge:'bg-amber-100'},
    ];

    let dashData = null;
    let chartInstance = null;
    let productChartInstance = null;
    let groupChartInstance   = null;
    let scopeProducts = [];
    let scopeClients  = [];

    if (window.ChartDataLabels) Chart.register(ChartDataLabels);

    // Formattazione con punto separatore delle migliaia (indipendente dal browser)
    function groupThousands(s) { return s.replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }
    function fmtDec(n) {                    // "1.234.567,89" (senza simbolo)
      n = Number(n) || 0; const neg = n < 0; n = Math.abs(n);
      const [i, d] = n.toFixed(2).split('.');
      return (neg ? '-' : '') + groupThousands(i) + ',' + d;
    }
    function fmtNum(n) {                    // numero: "1.234" o "1.234,5"
      n = Number(n) || 0; const neg = n < 0; n = Math.abs(n);
      const [i, d] = n.toFixed(2).split('.');
      let out = groupThousands(i);
      if (d !== '00') out += ',' + d.replace(/0$/, '');
      return (neg ? '-' : '') + out;
    }
    function fmtAxisNum(v) { return groupThousands(String(Math.round(Number(v) || 0))); }

    const round2 = n => Math.round(n * 100) / 100;
    const MONTHS_IT    = L.months;
    const MONTHS_SHORT = L.monthsShort;

    // Tutti i mesi da gennaio 2025 al mese corrente
    function monthsFrom2025(currentYM) {
      const [cy, cm] = (currentYM || '').split('-').map(Number);
      const arr = [];
      let y = 2025, m = 1;
      while (y < cy || (y === cy && m <= cm)) {
        arr.push({ y, m, key:`${y}-${String(m).padStart(2,'0')}` });
        m++; if (m > 12) { m = 1; y++; }
      }
      return arr;
    }
    // Tutti i trimestri da Q1 2025 al trimestre corrente
    function quartersFrom2025(currentYM) {
      const [cy, cm] = (currentYM || '').split('-').map(Number);
      const cq = Math.floor((cm - 1) / 3) + 1;
      const arr = [];
      let y = 2025, q = 1;
      while (y < cy || (y === cy && q <= cq)) {
        arr.push({ y, q, label:`Q${q} ${y}` });
        q++; if (q > 4) { q = 1; y++; }
      }
      return arr;
    }

    // --- aggregazioni client-side dai dati per-cliente ---
    const sumMonth   = (clients, ym) => clients.reduce((s,c) => s + (c.monthly?.[ym]   || 0), 0);
    const sumQuarter = (clients, ql) => clients.reduce((s,c) => s + (c.quarterly?.[ql] || 0), 0);

    // Somma il fatturato di un singolo gruppo prodotto per il mese/trimestre dato.
    // Se group e' vuoto, ricade sulla somma totale (usa monthly/quarterly precomputati).
    function sumMonthGroup(clients, ym, group) {
      if (!group) return sumMonth(clients, ym);
      let s = 0;
      clients.forEach(c => (c.orders || []).forEach(o => {
        const d = o.ship || o.date;
        if (!d || d.substring(0, 7) !== ym) return;
        (o.items || []).forEach(it => { if (it.group === group) s += it.total || 0; });
      }));
      return s;
    }
    function sumQuarterGroup(clients, ql, group) {
      if (!group) return sumQuarter(clients, ql);
      const [qStr, yStr] = ql.split(' ');
      const tq = Number(qStr.substring(1)), ty = Number(yStr);
      let s = 0;
      clients.forEach(c => (c.orders || []).forEach(o => {
        const d = o.ship || o.date;
        if (!d) return;
        const [y, m] = d.split('-').map(Number);
        if (y !== ty || Math.floor((m - 1) / 3) + 1 !== tq) return;
        (o.items || []).forEach(it => { if (it.group === group) s += it.total || 0; });
      }));
      return s;
    }

    function lastNMonths(currentYM, n) {
      const [y, m] = (currentYM || '').split('-').map(Number);
      const arr = [];
      for (let i = n - 1; i >= 0; i--) {
        let yy = y, mm = m - i;
        while (mm <= 0) { mm += 12; yy--; }
        arr.push({
          key:   `${yy}-${String(mm).padStart(2,'0')}`,
          label: new Date(yy, mm - 1, 1).toLocaleDateString('it-IT', {month:'short', year:'numeric'})
        });
      }
      return arr;
    }

    function pctChange(cur, prev) {
      if (!prev) return null;          // nessuna base di confronto
      return (cur - prev) / prev * 100;
    }
    function deltaBadge(p) {
      if (p === null) return '<span class="text-slate-300 text-xs">—</span>';
      const up = p >= 0;
      const cls = up ? 'text-emerald-600 bg-emerald-50' : 'text-red-600 bg-red-50';
      return `<span class="text-xs font-medium px-1.5 py-0.5 rounded ${cls}">${up?'+':''}${p.toFixed(1)}%</span>`;
    }
    function deltaInline(p) {
      if (p === null) return '';
      const up = p >= 0;
      const cls = up ? 'text-emerald-600' : 'text-red-600';
      return `<div class="text-xs font-medium ${cls} mt-1">${up?'▲ +':'▼ '}${p.toFixed(1)}% ${L.vsPrev}</div>`;
    }

    async function loadData() {
      try {
        const r = await fetch('data/' + DATA_FILE + '?t=' + Date.now());
        if (!r.ok) throw new Error(r.status);
        const enc = await r.json();
        dashData = await decryptEnc(enc, DASH_PWD);
        render(dashData);
      } catch (e) {
        // password non valida o dati non caricabili -> torna al login
        logout();
      }
    }

    function render(d) {
      document.getElementById('lastUpdate').textContent =
        (DASH_INFO.label ? L.view + ': ' + DASH_INFO.label + ' · ' : '') + L.updated + ': ' + d.generated_at;
      const clients = d.clients || [];

      // Nelle viste regionali i filtri nazione/regione sono superflui
      if (DASH_RESTRICTED) {
        document.getElementById('filterCountry').classList.add('hidden');
        document.getElementById('filterRegion').classList.add('hidden');
      }

      // Il filtro "Gruppi" (gruppi d'acquisto) compare solo nella vista completa
      if (DASH_RESTRICTED) {
        document.getElementById('filterGroup').classList.add('hidden');
      } else {
        populateClientGroupFilter(clients);
        document.getElementById('filterGroup').addEventListener('change', applyFilters);
      }

      populateCountryFilter(clients);
      populateClientFilter(clients);
      populateGroupFilter(clients);
      document.getElementById('filterCountry').addEventListener('change', () => {
        populateRegionFilter(clients);
        populateClientFilter(clients);
        applyFilters();
      });
      document.getElementById('filterRegion').addEventListener('change', () => {
        populateClientFilter(clients);
        applyFilters();
      });
      document.getElementById('filterClient').addEventListener('change', applyFilters);
      document.getElementById('filterFrom').addEventListener('change', applyFilters);
      document.getElementById('filterTo').addEventListener('change', applyFilters);
      document.getElementById('filterReset').addEventListener('click', () => {
        document.getElementById('filterCountry').value = '';
        populateRegionFilter(clients);
        document.getElementById('filterRegion').value = '';
        populateClientFilter(clients);
        document.getElementById('filterClient').value = '';
        document.getElementById('filterGroup').value = '';
        document.getElementById('filterFrom').value = '';
        document.getElementById('filterTo').value = '';
        document.getElementById('chartGroup').value = '';
        applyFilters();
      });
      document.getElementById('productSearch').addEventListener('input', applyProductSearch);
      document.getElementById('productSort').addEventListener('change', applyProductSearch);
      document.getElementById('chartMode').addEventListener('change', () =>
        renderChart(scopeClients, dashData));
      document.getElementById('chartGroup').addEventListener('change', applyFilters);

      applyFilters();
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');
    }

    // Vista del cliente con solo gli articoli del gruppo prodotto scelto;
    // ricalcola order.total, monthly e quarterly su quel sottoinsieme.
    function clientByGroup(c, group) {
      if (!group) return c;
      const monthly = {}, quarterly = {};
      const orders = (c.orders || []).map(o => {
        const items = (o.items || []).filter(it => it.group === group);
        const total = round2(items.reduce((s, it) => s + (it.total || 0), 0));
        return { ...o, items, total };
      }).filter(o => o.items.length > 0);
      orders.forEach(o => {
        const d = o.ship || o.date;
        if (!d) return;
        const ym = d.substring(0, 7);
        const [y, m] = d.split('-').map(Number);
        const ql = `Q${Math.floor((m - 1) / 3) + 1} ${y}`;
        monthly[ym]   = (monthly[ym]   || 0) + o.total;
        quarterly[ql] = (quarterly[ql] || 0) + o.total;
      });
      return { ...c, orders, monthly, quarterly };
    }

    // Costruisce una "vista" del cliente limitata agli ordini nel range di date,
    // ricalcolando monthly e quarterly su quel sottoinsieme.
    function clientInRange(c, from, to) {
      if (!from && !to) return c;
      const monthly = {}, quarterly = {};
      const orders = (c.orders || []).filter(o => {
        const d = o.ship || o.date;
        if (!d) return false;
        if (from && d < from) return false;
        if (to   && d > to)   return false;
        return true;
      });
      orders.forEach(o => {
        const d = o.ship || o.date;
        const ym = d.substring(0, 7);
        const [y, m] = d.split('-').map(Number);
        const ql = `Q${Math.floor((m - 1) / 3) + 1} ${y}`;
        monthly[ym]   = (monthly[ym]   || 0) + (o.total || 0);
        quarterly[ql] = (quarterly[ql] || 0) + (o.total || 0);
      });
      return { ...c, orders, monthly, quarterly };
    }

    function filteredClients() {
      const country = document.getElementById('filterCountry').value;
      const region  = document.getElementById('filterRegion').value;
      const client  = document.getElementById('filterClient').value;
      const from    = document.getElementById('filterFrom').value;
      const to      = document.getElementById('filterTo').value;
      const group   = document.getElementById('chartGroup').value;
      const cgroup  = document.getElementById('filterGroup').value;
      const anyScope = !!(from || to || group);
      return (dashData.clients || [])
        .filter(c =>
          (!country || c.country === country) &&
          (!region  || c.region  === region) &&
          (!client  || c.id      === client) &&
          (!cgroup  || (c.groups || []).includes(cgroup)))
        .map(c => clientInRange(c, from, to))
        .map(c => clientByGroup(c, group))
        .filter(c => !anyScope || (c.orders && c.orders.length > 0));
    }

    function applyFilters() {
      const clients = filteredClients();
      const country = document.getElementById('filterCountry').value;
      const region  = document.getElementById('filterRegion').value;
      const clientId= document.getElementById('filterClient').value;
      const clientName = clientId
        ? (dashData.clients.find(c => c.id === clientId) || {}).name : '';
      const from = document.getElementById('filterFrom').value;
      const to   = document.getElementById('filterTo').value;
      const todayWord = LANG === 'en' ? 'today' : 'oggi';
      const dateLbl = (from || to) ? `${from || '…'} → ${to || todayWord}` : '';
      const groupLbl  = document.getElementById('chartGroup').value || '';
      const cgroupLbl = document.getElementById('filterGroup').value || '';
      const scope   = [country, region, cgroupLbl, clientName, dateLbl, groupLbl].filter(Boolean).join(' · ');
      document.getElementById('filterScope').textContent =
        scope ? `${L.scope}: ${scope}` : `${L.scope}: ${L.allClientsLc}`;

      scopeClients = clients;
      renderChart(clients, dashData);
      renderKpis(clients, dashData);
      renderMonthlyTable(clients, dashData);
      renderClients(clients, dashData);
      scopeProducts = computeProducts(clients);
      applyProductSearch();

      // Grafici prodotti/gruppi: default dal 2026; se l'utente imposta un range
      // di date, prevale quello.
      const group = document.getElementById('chartGroup').value || '';
      const userDateSet = !!(from || to);
      const effFrom = userDateSet ? from : '2026-01-01';
      const effTo   = to;
      // Scope senza filtro gruppo (per il grafico "Fatturato per gruppo prodotto",
      // così mostra tutte le categorie e l'utente vede sempre la ripartizione).
      const productScopeAll = (dashData.clients || [])
        .filter(c =>
          (!country || c.country === country) &&
          (!region  || c.region  === region) &&
          (!clientId || c.id     === clientId))
        .map(c => clientInRange(c, effFrom, effTo));
      // Scope con filtro gruppo (per il Top 4 prodotti)
      const productScopeFiltered = productScopeAll.map(c => clientByGroup(c, group));
      renderProductChart(computeProducts(productScopeFiltered));
      renderGroupChart(computeGroups(productScopeAll));
      updateProductChartTitles(userDateSet, effFrom, effTo);
    }

    function renderKpis(clients, d) {
      const quarters = d.quarters || [];
      const month  = sumMonth(clients, d.current_month);
      const qCur   = sumQuarter(clients, quarters[0]);
      const qPrev  = sumQuarter(clients, quarters[1]);
      const qPrev2 = sumQuarter(clients, quarters[2]);
      const delta  = pctChange(qCur, qPrev);
      const kpis = [
        { label:L.currentMonth,    sub:d.current_month_label||'', value:month,  delta:null },
        { label:L.currentQuarter,  sub:quarters[0]||'',           value:qCur,   delta },
        { label:L.previousQuarter, sub:quarters[1]||'',           value:qPrev,  delta:null },
        { label:L.twoQuartersAgo,  sub:quarters[2]||'',           value:qPrev2, delta:null },
      ];
      document.getElementById('kpiCards').innerHTML = kpis.map((k, i) => {
        const c = KPI_COLORS[i];
        return `
          <div class="${c.bg} rounded-xl p-5 border border-transparent">
            <div class="flex justify-between items-start mb-2">
              <span class="text-xs font-semibold ${c.text} uppercase tracking-wide leading-tight">${k.label}</span>
              ${k.sub ? `<span class="text-xs ${c.badge} ${c.text} px-2 py-0.5 rounded-full font-medium shrink-0 ml-1">${k.sub}</span>` : ''}
            </div>
            <div class="text-2xl font-bold text-slate-800">${fmt(k.value)}</div>
            ${deltaInline(k.delta)}
          </div>`;
      }).join('');
    }

    const YEAR_COLORS = ['rgba(148,163,184,0.75)', 'rgba(37,99,235,0.8)',
                         'rgba(16,185,129,0.8)'];

    function renderChart(clients, d) {
      const mode  = document.getElementById('chartMode').value || 'A';
      const sMon  = sumMonth;
      const sQrt  = sumQuarter;
      const years = [...new Set(monthsFrom2025(d.current_month).map(x => x.y))];
      let labels, datasets, grouped = false;

      if (mode === 'A') {                       // mensile cronologico
        const ms = monthsFrom2025(d.current_month);
        labels = ms.map(x => `${MONTHS_SHORT[x.m-1]} ${String(x.y).slice(2)}`);
        const values = ms.map(x => round2(sMon(clients, x.key)));
        datasets = [{
          data: values,
          backgroundColor: values.map((_, i) => i === values.length - 1
            ? 'rgba(37,99,235,0.9)' : 'rgba(37,99,235,0.45)'),
          borderRadius: 5, borderSkipped: false,
        }];
      } else if (mode === 'C') {                // trimestrale cronologico
        const qs = quartersFrom2025(d.current_month);
        labels = qs.map(x => `Q${x.q} ${String(x.y).slice(2)}`);
        const values = qs.map(x => round2(sQrt(clients, x.label)));
        datasets = [{
          data: values,
          backgroundColor: values.map((_, i) => i === values.length - 1
            ? 'rgba(37,99,235,0.9)' : 'rgba(37,99,235,0.45)'),
          borderRadius: 5, borderSkipped: false,
        }];
      } else if (mode === 'B') {                // mensile, anni affiancati
        grouped = true;
        labels = MONTHS_SHORT;
        datasets = years.map((yr, idx) => ({
          label: String(yr),
          data: Array.from({length:12}, (_, i) =>
            round2(sMon(clients, `${yr}-${String(i+1).padStart(2,'0')}`))),
          backgroundColor: YEAR_COLORS[idx % YEAR_COLORS.length],
          borderRadius: 5, borderSkipped: false,
        }));
      } else {                                  // mode D: trimestrale, anni affiancati
        grouped = true;
        labels = ['Q1','Q2','Q3','Q4'];
        datasets = years.map((yr, idx) => ({
          label: String(yr),
          data: [1,2,3,4].map(q => round2(sQrt(clients, `Q${q} ${yr}`))),
          backgroundColor: YEAR_COLORS[idx % YEAR_COLORS.length],
          borderRadius: 5, borderSkipped: false,
        }));
      }

      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(document.getElementById('monthlyChart'), {
        type: 'bar',
        data: { labels, datasets },
        options: {
          responsive: true,
          plugins: {
            legend: { display: grouped, position: 'top', labels: { boxWidth: 12 } },
            datalabels: { display: false },
            tooltip: { callbacks: {
              label: ctx => ' ' + (ctx.dataset.label ? ctx.dataset.label + ': ' : '') + fmt(ctx.raw)
            } }
          },
          scales: {
            x: { grid: { display: false } },
            y: {
              beginAtZero: true,
              ticks: { callback: v => '€' + fmtAxisNum(v) },
              grid: { color: 'rgba(0,0,0,.04)' }
            }
          }
        }
      });
    }

    function renderMonthlyTable(clients, d) {
      const curY  = Number((d.current_month || '').split('-')[0]) || new Date().getFullYear();
      const prevY = curY - 1;
      document.getElementById('yoyYears').textContent = `${prevY} vs ${curY}`;

      let totPrev = 0, totCur = 0, rows = '';
      for (let m = 1; m <= 12; m++) {
        const mm    = String(m).padStart(2,'0');
        const vPrev = sumMonth(clients, `${prevY}-${mm}`);
        const vCur  = sumMonth(clients, `${curY}-${mm}`);
        totPrev += vPrev; totCur += vCur;
        rows += `
          <tr class="border-t border-slate-100 hover:bg-slate-50 transition-colors">
            <td class="px-6 py-2.5 text-slate-700">${MONTHS_IT[m-1]}</td>
            <td class="px-6 py-2.5 text-right text-slate-500">${fmt(vPrev)}</td>
            <td class="px-6 py-2.5 text-right font-medium text-slate-800">${fmt(vCur)}</td>
            <td class="px-6 py-2.5 text-right">${deltaBadge(pctChange(vCur, vPrev))}</td>
          </tr>`;
      }
      document.getElementById('monthlyTable').innerHTML = `
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-slate-50 text-xs border-b border-slate-200">
                <th class="px-6 py-3 text-left text-slate-500 font-medium">${L.month}</th>
                <th class="px-6 py-3 text-right text-slate-500 font-medium">${prevY}</th>
                <th class="px-6 py-3 text-right text-slate-500 font-medium">${curY}</th>
                <th class="px-6 py-3 text-right text-slate-500 font-medium">Δ%</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
            <tfoot>
              <tr class="bg-slate-50 border-t-2 border-slate-200 font-semibold">
                <td class="px-6 py-3 text-slate-700">${L.total}</td>
                <td class="px-6 py-3 text-right text-slate-500">${fmt(totPrev)}</td>
                <td class="px-6 py-3 text-right text-slate-800">${fmt(totCur)}</td>
                <td class="px-6 py-3 text-right">${deltaBadge(pctChange(totCur, totPrev))}</td>
              </tr>
            </tfoot>
          </table>
        </div>`;
    }

    function computeProducts(clients) {
      const prod = {};
      clients.forEach(c => (c.orders || []).forEach(o => (o.items || []).forEach(it => {
        const code = it.code || 'N/D';
        if (!prod[code]) prod[code] = { code, name: it.name, qty: 0, total: 0 };
        prod[code].qty   += it.qty;
        prod[code].total += it.total;
      })));
      return Object.values(prod).sort((a,b) => b.total - a.total);
    }

    function computeGroups(clients) {
      const grp = {};
      clients.forEach(c => (c.orders || []).forEach(o => (o.items || []).forEach(it => {
        const g = it.group || 'Altri';
        if (!grp[g]) grp[g] = { group: g, qty: 0, total: 0 };
        grp[g].qty   += it.qty   || 0;
        grp[g].total += it.total || 0;
      })));
      return Object.values(grp).sort((a,b) => b.total - a.total);
    }

    function updateProductChartTitles(userDateSet, effFrom, effTo) {
      const tProd  = document.getElementById('productChartTitle');
      const tGroup = document.getElementById('groupChartTitle');
      if (!tProd || !tGroup) return;
      if (userDateSet) {
        const todayWord = LANG === 'en' ? 'today' : 'oggi';
        const range = `(${effFrom || '…'} → ${effTo || todayWord})`;
        tProd.textContent  = L.top4ProductsRange  + ' ' + range;
        tGroup.textContent = L.revenueByGroupRange + ' ' + range;
      } else {
        tProd.textContent  = L.top4Products;
        tGroup.textContent = L.revenueByGroup;
      }
    }

    function renderGroupChart(groups) {
      const labels = groups.map(g => g.group);
      const values = groups.map(g => round2(g.total));
      if (groupChartInstance) groupChartInstance.destroy();
      groupChartInstance = new Chart(document.getElementById('groupChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: 'rgba(37,99,235,0.7)',
            borderRadius: 5,
            borderSkipped: false,
          }]
        },
        options: {
          responsive: true,
          layout: { padding: { top: 24 } },
          plugins: {
            legend: { display: false },
            datalabels: {
              display: true, anchor: 'end', align: 'end',
              color: '#334155', font: { weight: '600', size: 11 },
              formatter: v => fmt(v),
            },
            tooltip: { callbacks: {
              label: ctx => ' ' + L.revenue + ': ' + fmt(ctx.raw)
            } }
          },
          scales: {
            x: { grid: { display: false } },
            y: {
              beginAtZero: true,
              ticks: { callback: v => '€' + fmtAxisNum(v) },
              grid: { color: 'rgba(0,0,0,.04)' }
            }
          }
        }
      });
    }

    function applyProductSearch() {
      const q    = (document.getElementById('productSearch').value || '').toLowerCase();
      const sort = document.getElementById('productSort').value || 'total';
      const list = scopeProducts
        .filter(p => (p.code || '').toLowerCase().includes(q) || (p.name || '').toLowerCase().includes(q))
        .slice()
        .sort((a, b) => (b[sort] || 0) - (a[sort] || 0));
      renderProducts(list);
    }

    function populateCountryFilter(clients) {
      const sel = document.getElementById('filterCountry');
      const cur = sel.value;
      const countries = [...new Set(clients.map(c => c.country).filter(Boolean))].sort();
      sel.innerHTML = `<option value="">${L.allCountries}</option>` +
        countries.map(c => `<option value="${c}">${c}</option>`).join('');
      sel.value = cur;
      populateRegionFilter(clients);
    }

    function populateRegionFilter(clients) {
      const country = document.getElementById('filterCountry').value;
      const sel     = document.getElementById('filterRegion');
      const cur     = sel.value;
      const list    = country ? clients.filter(c => c.country === country) : clients;
      const regions = [...new Set(list.map(c => c.region).filter(Boolean))].sort();
      sel.innerHTML = `<option value="">${L.allRegions}</option>` +
        regions.map(r => `<option value="${r}">${r}</option>`).join('');
      sel.value = regions.includes(cur) ? cur : '';
    }

    function populateClientGroupFilter(clients) {
      const sel = document.getElementById('filterGroup');
      if (!sel) return;
      const cur = sel.value;
      const set = new Set();
      clients.forEach(c => (c.groups || []).forEach(g => set.add(g)));
      const list = [...set].sort();
      sel.innerHTML = `<option value="">${L.allClientGroups}</option>` +
        list.map(g => `<option value="${g}">${g}</option>`).join('');
      sel.value = list.includes(cur) ? cur : '';
    }

    function populateGroupFilter(clients) {
      const sel = document.getElementById('chartGroup');
      const cur = sel.value;
      const groups = new Set();
      clients.forEach(c => (c.orders || []).forEach(o => (o.items || []).forEach(it => {
        if (it.group) groups.add(it.group);
      })));
      const list = [...groups].sort();
      sel.innerHTML = `<option value="">${L.allGroups}</option>` +
        list.map(g => `<option value="${g}">${g}</option>`).join('');
      sel.value = list.includes(cur) ? cur : '';
    }

    function populateClientFilter(clients) {
      const country = document.getElementById('filterCountry').value;
      const region  = document.getElementById('filterRegion').value;
      const sel     = document.getElementById('filterClient');
      const cur     = sel.value;
      const list    = clients
        .filter(c => (!country || c.country === country) && (!region || c.region === region))
        .sort((a,b) => (a.name||'').localeCompare(b.name||''));
      sel.innerHTML = `<option value="">${L.allClients}</option>` +
        list.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      sel.value = list.some(c => c.id === cur) ? cur : '';
    }

    function renderProductChart(products) {
      const top    = products.slice(0, 4);
      // etichetta asse X: codice su una riga, nome del prodotto fra parentesi sotto
      const labels = top.map(p => {
        const code = p.code || 'N/D';
        let name = p.name || '';
        if (name.length > 24) name = name.slice(0, 23) + '…';
        return name ? [code, `(${name})`] : [code];
      });
      const values = top.map(p => round2(p.total));
      if (productChartInstance) productChartInstance.destroy();
      productChartInstance = new Chart(document.getElementById('productChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: 'rgba(16,185,129,0.7)',
            borderRadius: 5,
            borderSkipped: false,

          responsive: true,
          layout: { padding: { top: 24 } },

            legend: { display: false },

              display: true,
              anchor: 'end',
              align: 'end',
              color: '#334155',
              font: { weight: '600', size: 12 },

    function renderClients(clients, d) {
      document.getElementById('clientCount').textContent = clients.length + ' ' + L.clients;
      document.getElementById('clientsTable').innerHTML = clients.length
        ? clients.map((c, ci) => buildClientRow(c, ci, d)).join('')
        : `<p class="px-6 py-8 text-slate-400 text-sm text-center">${L.noClientsFilter}</p>`;
    }

    function buildClientRow(c, ci, d) {
      const orders  = (c.orders || []).slice().sort((a,b) => (b.ship||b.date).localeCompare(a.ship||a.date));
      const qLabels = (d.quarters || []).slice(0,3).reverse();  // ordine cronologico (più vecchio → recente)

      const qBadges = qLabels.map(q =>
        `<span class="text-slate-400 text-xs">${q}:&nbsp;<span class="font-semibold text-slate-600">${fmt(c.quarterly?.[q]||0)}</span></span>`
      ).join('<span class="text-slate-200 mx-1">|</span>');

      // Confronto mese corrente e trimestre corrente con lo stesso periodo dell'anno precedente
      const curMonthKey = d.current_month || '';
      const [cYear, cMon] = curMonthKey.split('-');
      const prevYear      = Number(cYear) - 1;
      const mCur  = c.monthly?.[curMonthKey] || 0;
      const mPrev = c.monthly?.[`${prevYear}-${cMon}`] || 0;
      const curQ  = (d.quarters || [])[0] || '';
      const qp    = curQ.split(' ');                       // ["Q2","2026"]
      const prevQ = qp.length === 2 ? `${qp[0]} ${Number(qp[1]) - 1}` : '';
      const qCur  = c.quarterly?.[curQ]  || 0;
      const qPrev = c.quarterly?.[prevQ] || 0;
      const monthLabel = d.current_month_label || L.currentMonth;

      const compareBlock = (label, cur, prev) => `
        <div>
          <div class="text-xs text-slate-400 mb-0.5">${label}</div>
          <div class="text-base font-bold text-slate-800 leading-tight">${fmt(cur)}</div>
          <div class="text-xs text-slate-400">${fmt(prev)} <span class="text-slate-300">(${prevYear})</span></div>
          <div class="mt-1">${deltaBadge(pctChange(cur, prev))}</div>
        </div>`;

      const ordersRows = orders.map((o, oi) => {
        const itemRows = (o.items || []).map(it => `
          <tr class="bg-slate-50 text-xs border-t border-slate-100">
            <td class="pl-24 pr-3 py-2 text-slate-500" colspan="2">
              <span class="font-mono bg-white border border-slate-200 px-1.5 py-0.5 rounded text-slate-700 mr-2">${it.code||'N/D'}</span>
              <span class="text-slate-600">${it.name}</span>
            </td>
            <td class="px-4 py-2 text-right text-slate-600">${fmtN(it.qty)}</td>
            <td class="px-4 py-2 text-right text-slate-500">${fmt(it.unit)}</td>
            <td class="px-4 py-2 text-right font-medium text-slate-700">${fmt(it.total)}</td>
          </tr>`).join('');

        return `
          <tr class="border-t border-slate-100 hover:bg-slate-50 cursor-pointer transition-colors"
              onclick="toggleEl('oi-${ci}-${oi}','arr-${ci}-${oi}')">
            <td class="pl-14 pr-3 py-2.5" colspan="2">
              <div class="flex items-center gap-2">
                <span class="text-slate-300 text-xs w-3 text-center transition-transform" id="arr-${ci}-${oi}">▶</span>
                <span class="font-mono text-sm text-blue-600 font-medium">${o.num || o.id.slice(0,10)}</span>
                ${o.ship ? `<span class="text-xs text-slate-400">${L.ship} ${o.ship}</span>` : `<span class="text-xs text-slate-400">${o.date}</span>`}
                <span class="text-xs text-slate-300">${o.items?.length||0} ${L.prod}</span>
              </div>
            </td>
            <td class="px-4 py-2.5 text-right text-xs text-slate-400"></td>
            <td class="px-4 py-2.5 text-right text-xs text-slate-400"></td>
            <td class="px-4 py-2.5 text-right font-semibold text-slate-800 text-sm">${fmt(o.total)}</td>
          </tr>
          <tr id="oi-${ci}-${oi}" class="hidden">
            <td colspan="5" class="p-0">
              <table class="w-full">
                <thead>
                  <tr class="bg-blue-50 text-xs">
                    <th class="pl-24 pr-3 py-1.5 text-left text-slate-500 font-medium" colspan="2">${L.codeOrProduct}</th>
                    <th class="px-4 py-1.5 text-right text-slate-500 font-medium">${L.qty}</th>
                    <th class="px-4 py-1.5 text-right text-slate-500 font-medium">${L.unitPrice}</th>
                    <th class="px-4 py-1.5 text-right text-slate-500 font-medium">${L.total}</th>
                  </tr>
                </thead>
                <tbody>${itemRows || `<tr><td colspan="5" class="px-24 py-2 text-xs text-slate-400">${L.noItems}</td></tr>`}</tbody>
              </table>
            </td>
          </tr>`;
      }).join('');

      return `
        <div class="border-b border-slate-100 last:border-0">
          <div class="px-6 py-4 flex items-start justify-between cursor-pointer hover:bg-slate-50 transition-colors"
               onclick="toggleEl('cl-${ci}','cl-arr-${ci}')">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="text-slate-300 text-xs w-3 text-center transition-transform" id="cl-arr-${ci}">▶</span>
                <span class="font-semibold text-slate-800 text-sm">${c.name}</span>
                ${c.country ? `<span class="text-xs text-slate-500 bg-blue-50 px-1.5 py-0.5 rounded">${c.country}${c.region ? ' · ' + c.region : ''}</span>` : ''}
                <span class="text-xs text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded">${orders.length} ${L.orders}</span>
              </div>
              <div class="ml-5 mt-1 flex gap-3 flex-wrap">${qBadges}</div>
            </div>
            <div class="text-right ml-4 shrink-0 flex gap-5">
              ${compareBlock(monthLabel, mCur, mPrev)}
              ${compareBlock(curQ || L.currentQuarter, qCur, qPrev)}
            </div>
          </div>
          <table class="w-full hidden" id="cl-${ci}">
            <thead>
              <tr class="bg-slate-50 text-xs">
                <th class="pl-14 pr-3 py-2 text-left text-slate-500 font-medium" colspan="2">${L.order}</th>
                <th class="px-4 py-2 text-right text-slate-500 font-medium"></th>
                <th class="px-4 py-2 text-right text-slate-500 font-medium"></th>
                <th class="px-4 py-2 text-right text-slate-500 font-medium">${L.total}</th>
              </tr>
            </thead>
            <tbody>${ordersRows || `<tr><td colspan="5" class="px-14 py-3 text-xs text-slate-400">${L.noOrders}</td></tr>`}</tbody>
          </table>
        </div>`;
    }

    function renderProducts(products) {
      document.getElementById('productsTable').innerHTML = products.length ? `
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-slate-50 text-xs border-b border-slate-200">
                <th class="px-6 py-3 text-left text-slate-500 font-medium">${L.code}</th>
                <th class="px-6 py-3 text-left text-slate-500 font-medium">${L.product}</th>
                <th class="px-6 py-3 text-right text-slate-500 font-medium">${L.totalQty}</th>
                <th class="px-6 py-3 text-right text-slate-500 font-medium">${L.valueEuro}</th>
              </tr>
            </thead>
            <tbody>
              ${products.map((p,i) => `
                <tr class="${i%2===0?'bg-white':'bg-slate-50'} border-t border-slate-100 hover:bg-blue-50 transition-colors">
                  <td class="px-6 py-3">
                    <span class="font-mono bg-slate-100 px-2 py-0.5 rounded text-slate-700 text-xs">${p.code||'N/D'}</span>
                  </td>
                  <td class="px-6 py-3 text-slate-700">${p.name||'—'}</td>
                  <td class="px-6 py-3 text-right text-slate-700">${fmtN(p.qty)}</td>
                  <td class="px-6 py-3 text-right font-semibold text-slate-800">${fmt(p.total)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`
        : `<p class="px-6 py-8 text-slate-400 text-sm text-center">${L.noProducts}</p>`;
    }

    function toggleEl(id, arrowId) {
      const el    = document.getElementById(id);
      const arrow = document.getElementById(arrowId);
      const open  = el.classList.toggle('hidden');
      if (arrow) arrow.textContent = open ? '▶' : '▼';
    }

    loadData();
    setInterval(loadData, 5 * 60 * 1000); // refresh ogni 5 min
  </script>
</body>
</html>
